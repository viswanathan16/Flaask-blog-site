<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }} - Flask Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .post-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .post-header {
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 15px;
            line-height: 1.2;
        }
        .post-meta {
            color: #888;
            font-size: 1em;
        }
        .post-meta strong {
            color: #667eea;
        }
        .post-content {
            color: #333;
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 30px;
            white-space: pre-wrap;
        }
        .back-btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .back-btn:hover {
            background: #764ba2;
        }
        .post-id {
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 0.9em;
            color: #666;
            display: inline-block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="post-card">
            <div class="post-id">Post #{{ post.id }}</div>
            <div class="post-header">
                <h1>{{ post.title }}</h1>
                <div class="post-meta">
                    By <strong>{{ post.author }}</strong> | 📅 {{ post.created_at }}
                </div>
            </div>
            <div class="post-content">{{ post.content }}</div>
            <a href="/" class="back-btn">← Back to All Posts</a>
        </div>
    </div>
</body>
</html>
